version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: contas-db
    environment:
      POSTGRES_DB: contas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
#    container_name: contas-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

  app:
    build: .
    container_name: contas-app
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8080:8080"